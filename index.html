<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Home - Jericho Noel A. Tibayan</title>

<!-- EXTERNAL CSS (jec.css) -->
<link rel="stylesheet" href="jec.css">

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    padding-top: 60px;
  }

  /* NAVBAR - LOCKED AT TOP */
  .nav-container {
    background: #01253b;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 1000;
    box-sizing: border-box;
  }

  .logo {
    color: white;
    text-decoration: none;
    font-size: 18px;
    font-weight: bold;
  }

  .menu-toggle {
    font-size: 24px;
    background: none;
    border: none;
    color: white;
    cursor: pointer;
    display: none;
  }

  .nav-links {
    list-style: none;
    display: flex;
    gap: 15px;
    margin: 0;
    padding: 0;
  }

  .nav-links li a {
    text-decoration: none;
    color: white;
    padding: 8px 12px;
    border-radius: 5px;
    transition: 0.3s;
  }

  .nav-links li a:hover {
    background: #00bcd4;
    color: black;
  }

  /* MOBILE RESPONSIVENESS */
  @media (max-width: 768px) {
    .menu-toggle { display: block; }

    .nav-links {
      display: none;
      flex-direction: column;
      position: absolute;
      top: 60px;
      right: 10px;
      background: #01253b;
      width: 200px;
      padding: 10px;
      border-radius: 10px;
    }

    .nav-links.active {
      display: flex;
    }
  }

  /* HEADER */
  header {
    text-align: center;
    padding: 25px;
  }

  header h1 {
    color: #01253b;
    margin: 0;
  }

  /* CARD STYLES */
  .card-container {
    background: white;
    padding: 30px;
    margin: 20px auto;
    max-width: 800px;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }

  h2 {
    color: #01253b;
    border-bottom: 2px solid #00bcd4;
    padding-bottom: 10px;
    margin-top: 0;
  }

  p {
    color: #333;
    line-height: 1.6;
  }

  /* PROFILE IMAGE */
  .profile-img {
    display: block;
    width: 200px;
    height: 200px;
    object-fit: cover;
    border-radius: 50%;
    border: 5px solid #00bcd4;
    margin: 20px auto;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
  }

  .text-center {
    text-align: center;
  }
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="nav-container">
  <a href="index.html" class="logo">My Portfolio</a>

  <button class="menu-toggle" id="menu-toggle">☰</button>

  <ul class="nav-links" id="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About Me</a></li>
    <li><a href="skills.html">Skills</a></li>
    <li><a href="experience.html">Experience</a></li>
    <li><a href="education.html">Education</a></li>
    <li><a href="techstack.html">Tech Stack</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</div>

<!-- HEADER -->
<header>
  <h1>Home</h1>
</header>

<!-- CONTENT -->
<main>
  <section class="card-container text-center">
    <h2>Hi, I'm Jericho Noel A. Tibayan</h2>
    <p>I'm a student at St. Dominic College of Asia based in Bacoor City, Cavite.</p>

    <img src="pogi.jpg" alt="Profile Picture" class="profile-img">
  </section>
</main>

<!-- WAVES (from jec.css) -->
<div class="wave"></div>
<div class="wave"></div>
<div class="wave"></div>

<!-- SCRIPT -->
<script>
  const toggle = document.getElementById("menu-toggle");
  const nav = document.getElementById("nav-links");

  toggle.addEventListener("click", () => {
    nav.classList.toggle("active");
  });
</script>

</body>
</html>
