<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Contact Me - Jericho Noel A. Tibayan</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f2f6ff;
  }

  /* NAVBAR */
  .nav-container {
    background: #01253b;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    color: white;
    text-decoration: none;
    font-size: 18px;
    font-weight: bold;
  }

  .menu-toggle {
    font-size: 24px;
    background: none;
    border: none;
    color: white;
    cursor: pointer;
    display: none;
  }

  .nav-links {
    list-style: none;
    display: flex;
    gap: 15px;
    margin: 0;
    padding: 0;
  }

  .nav-links li a {
    text-decoration: none;
    color: white;
    padding: 8px 12px;
    border-radius: 5px;
    transition: 0.3s;
  }

  .nav-links li a:hover {
    background: #00bcd4;
    color: black;
  }

  /* MOBILE */
  @media (max-width: 768px) {
    .menu-toggle {
      display: block;
    }

    .nav-links {
      display: none;
      flex-direction: column;
      position: absolute;
      top: 60px;
      right: 10px;
      background: #01253b;
      width: 200px;
      padding: 10px;
      border-radius: 10px;
    }

    .nav-links.active {
      display: flex;
    }
  }

  /* HEADER */
  header {
    text-align: center;
    padding: 25px;
  }

  header h1 {
    color: #01253b;
  }

  /* CONTACT CARD */
  .contact-container {
    max-width: 800px;
    margin: 20px auto;
    padding: 20px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }

  h2 {
    color: #01253b;
    margin-bottom: 10px;
  }

  .contact-info p {
    margin: 12px 0;
    font-size: 16px;
    color: #333;
  }

  .contact-info a {
    color: #007bff;
    text-decoration: none;
  }

  .contact-info a:hover {
    text-decoration: underline;
  }
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="nav-container">
  <a href="index.html" class="logo">My Portfolio</a>

  <button class="menu-toggle" id="menu-toggle">☰</button>

  <ul class="nav-links" id="nav-links">

    <li><a href="skills.html">Skills</a></li>
    <li><a href="experience.html">Experience</a></li>
    <li><a href="education.html">Education</a></li>
    <li><a href="techstack.html">Tech Stack</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</div>

<!-- HEADER -->
<header>
  <h1>Contact Me</h1>
</header>

<!-- CONTACT SECTION -->
<section class="contact-container">
  <h2>Let's Get in Touch</h2>

  <div class="contact-info">
    <p><strong>Email:</strong> 
      <a href="mailto:jerichotibayan11@gmail.com">jerichotibayan11@gmail.com</a>

    <p><strong>Phone:</strong> 09912313264</p>

      <a href="https://www.facebook.com/jerichonoel22/" target="_blank">
        facebook.com/jerichonoel22

    </p>

<!-- SCRIPT -->
<script>
  const toggle = document.getElementById("menu-toggle");
  const nav = document.getElementById("nav-links");

  toggle.addEventListener("click", () => {
    nav.classList.toggle("active");
  });
</script>

</body>
</html>
